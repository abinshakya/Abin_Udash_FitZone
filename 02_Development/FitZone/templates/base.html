{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone</title>
    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     <link rel="stylesheet" href="{% static 'Banner.css'%}">
    
      <link rel="stylesheet" href="{% static 'trainerregestration.css' %}">
        <link rel="stylesheet" href="{% static 'trainer/trainer.css'%}">
        <link rel="stylesheet" href="{% static 'index.css'%}">
    <style>
        .base-messages-toast-wrap {
            position: fixed;
            top: 88px;
            right: 20px;
            z-index: 1060;
            width: min(500px, calc(100% - 24px));
        }

        .base-alert-toast {
            border-radius: 10px;
            backdrop-filter: blur(10px);
            margin-bottom: 10px;
            font-weight: 600;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
            border: 1px solid transparent;
            color: #0f172a;
            min-height: 62px;
        }

        .base-alert-toast {
            background: #5d8fe6;
            border-color: #4f7dd0;
        }

        .base-alert-toast.msg-success {
            background: #cde3da;
            border-color: #b7d8cc;
            color: #1f6c56;
        }

        .base-alert-toast.msg-warning {
            background: #fbbf24;
            border-color: #f59e0b;
        }

        .base-alert-toast.msg-danger,
        .base-alert-toast.msg-error {
            background: #f87171;
            border-color: #ef4444;
        }

        .base-alert-toast .btn-close {
            filter: none;
            opacity: 0.8;
            margin-left: auto;
        }
    </style>

</head>
<body>
    {%include 'navbar.html'%}

    <!-- Messages Container -->
    {% if messages %}
    <div class="base-messages-toast-wrap">
        {% for message in messages %}
        <div class="alert alert-dismissible fade show base-alert-toast base-auto-close {% if message.tags == 'success' %}msg-success{% elif message.tags == 'error' or message.tags == 'danger' %}msg-danger{% elif message.tags == 'warning' %}msg-warning{% else %}msg-info{% endif %}" role="alert">
            <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' or message.tags == 'danger' %}fa-exclamation-circle{% elif message.tags == 'warning' %}fa-exclamation-triangle{% else %}fa-info-circle{% endif %} me-2"></i>
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>

    <script>
        setTimeout(function() {
            document.querySelectorAll('.base-auto-close').forEach(function(alert) {
                var bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
    {% endif %}

{% block content %}
    
{% endblock content %}
    <br>
    {%include 'footer.html'%}
    
</body>
</html>
