{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'Banner.css' %}">
    
    <link rel="stylesheet" href="{% static 'index.css' %}">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .swiper { width: 100%; height: 85vh; border-radius: 0 0 40px 40px; overflow: hidden; }
        .swiper-slide { position: relative; background-position: center; background-size: cover; display: flex; align-items: center; justify-content: center; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)); }
        .hero-content { position: relative; z-index: 10; color: white; text-align: center; max-width: 800px; padding: 0 20px; }
        .hero-content h1 { font-size: 3.5rem; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); margin-bottom: 1.5rem; letter-spacing: -1px; }
        .hero-content p { font-size: 1.25rem; opacity: 0.9; margin-bottom: 2.5rem; line-height: 1.6; }
        .cta-button { background-color: #ff781f; border: none; color: white; font-weight: 700; padding: 12px 35px; border-radius: 50px; transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(255, 120, 31, 0.4); }
        .cta-button:hover { background-color: #e66a1a; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 120, 31, 0.5); color: white; }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <!-- Swiper Hero Section -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            {% if banners %}
                {% for banner in banners %}
                <div class="swiper-slide" style="background-image: url('{{ banner.image.url }}');">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <h1>{{ banner.title }}</h1>
                        <p>{{ banner.subtitle }}</p>
                        <div class="d-flex gap-3 justify-content-center flex-wrap">
                            <a href="{{ banner.link_url }}" class="btn cta-button px-5">
                                <i class="fas fa-play-circle me-2"></i> {{ banner.link_text }}
                            </a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="swiper-slide" style="background-color: #1a1a1a;">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <!-- No banners added in admin -->
                        <div class="d-flex gap-3 justify-content-center flex-wrap mt-4">
                            <a href="{% url 'membership' %}" class="btn cta-button px-5">
                                <i class="fas fa-play-circle me-2"></i> Get Started
                            </a>
                        </div>
                    </div>
                </div>
            {% endif %}
        </div>
        <div class="swiper-button-next" style="color: white; width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 50%; backdrop-filter: blur(5px);"></div>
        <div class="swiper-button-prev" style="color: white; width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 50%; backdrop-filter: blur(5px);"></div>
        <div class="swiper-pagination"></div>
    </div>

{% include 'card.html' %}
{% include 'footer.html' %}

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: { delay: 5000, disableOnInteraction: false },
            pagination: { el: ".swiper-pagination", clickable: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        });
    </script>
</html>
