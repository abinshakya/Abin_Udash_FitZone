{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
  <form method="post" novalidate>
    {% csrf_token %}
    <fieldset class="module aligned">
      <h2>Broadcast Notification</h2>
      <p>Send a notification to all members, all trainers, or both groups.</p>
      {{ form.as_p }}
    </fieldset>
    <div class="submit-row">
      <input type="submit" value="Send Broadcast" class="default">
      <a href="../" class="button cancel-link">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
