{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | FitZone</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated Background */
        .error-container {
            position: relative;
            width: 100%;
            padding: 20px;
        }

        .error-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideUp 0.6s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error Code Animation */
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* Icon Animation */
        .error-icon {
            font-size: 5rem;
            color: #f5576c;
            margin-bottom: 20px;
            animation: shake 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }

        .error-title {
            font-size: 2.5rem;
            color: #333;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .error-description {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* Button Styling */
        .error-button {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            margin: 10px;
        }

        .error-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(245, 87, 108, 0.6);
            color: white;
            text-decoration: none;
        }

        .error-button:active {
            transform: translateY(-1px);
        }

        .error-button-secondary {
            background: transparent;
            color: #f5576c;
            border: 2px solid #f5576c;
            box-shadow: none;
        }

        .error-button-secondary:hover {
            background: #f5576c;
            color: white;
            box-shadow: 0 6px 25px rgba(245, 87, 108, 0.6);
        }

        /* Decorative Elements */
        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .shape-1 {
            width: 200px;
            height: 200px;
            background: white;
            top: -50px;
            left: -50px;
            animation: moveShape 15s ease-in-out infinite;
        }

        .shape-2 {
            width: 150px;
            height: 150px;
            background: white;
            bottom: -30px;
            right: -30px;
            animation: moveShape 20s ease-in-out infinite;
        }

        @keyframes moveShape {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(30px, 30px);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .error-box {
                padding: 40px 25px;
            }

            .error-code {
                font-size: 5rem;
            }

            .error-title {
                font-size: 1.8rem;
            }

            .error-description {
                font-size: 1rem;
                margin-bottom: 25px;
            }

            .error-button {
                padding: 12px 30px;
                font-size: 0.95rem;
                display: block;
                width: 100%;
                margin: 8px 0;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 3.5rem;
            }

            .error-icon {
                font-size: 3rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-description {
                font-size: 0.95rem;
            }
        }

        /* Button Container */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="error-container">
        <div class="error-box">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>

            <div class="error-code">500</div>

            <h1 class="error-title">Server Error</h1>

            <p class="error-description">
                Something went wrong on our end. Our team has been notified and is working to fix this issue. Please try again in a few moments.
            </p>

            <div class="button-container">
                <a href="{% url 'home' %}" class="error-button">
                    <i class="fas fa-home me-2"></i>Go to Home
                </a>
                <button class="error-button error-button-secondary" onclick="window.location.reload()">
                    <i class="fas fa-redo me-2"></i>Refresh Page
                </button>
            </div>

            <p style="margin-top: 30px; color: #999; font-size: 0.95rem;">
                Error Code: 500 | If the problem persists, please contact our support team.
            </p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
