{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ action_title }} - FitZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #ff7a18;
      --orange2: #ff9a3c;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Poppins", system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(1000px 520px at 18% 0%, rgba(255,122,24,0.18), transparent 60%),
        radial-gradient(900px 450px at 85% 10%, rgba(255,154,60,0.10), transparent 60%),
        linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .head {
      padding: 18px 22px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: rgba(0,0,0,0.02);
    }
    .head h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: #1a1a1a;
    }
    .body {
      padding: 22px;
    }
    .meta {
      margin: 0 0 14px;
      color: rgba(0,0,0,0.65);
      font-size: 14px;
      line-height: 1.5;
    }
    .meta strong { color: #1a1a1a; }
    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      resize: vertical;
      outline: none;
    }
    textarea:focus {
      border-color: rgba(255,122,24,0.55);
      box-shadow: 0 0 0 3px rgba(255,122,24,0.12);
    }
    .actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #4b5563;
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="head">
      <h1>{{ action_title }}</h1>
    </div>
    <div class="body">
      <p class="meta">
        <strong>Client:</strong> {{ booking.user.get_full_name|default:booking.user.username }}<br>
        <strong>Booking Date:</strong> {{ booking.booking_date|date:"M d, Y" }}
      </p>
      <p class="meta">{{ action_description }}</p>

      <form method="post" action="{% url 'update_booking_status' booking.id %}">
        {% csrf_token %}
        <input type="hidden" name="status" value="{{ status_value }}">
        <textarea name="{{ reason_field }}" placeholder="{{ reason_placeholder }}" required></textarea>
        <div class="actions">
          <a class="btn btn-secondary" href="{% url 'trainer_dashboard' %}">Go Back</a>
          <button class="btn btn-danger" type="submit">{{ submit_label }}</button>
        </div>
      </form>
    </div>
  </section>
</body>
</html>
