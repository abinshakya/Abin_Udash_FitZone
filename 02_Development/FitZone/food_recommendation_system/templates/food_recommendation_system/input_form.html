{% extends 'ai_chat.html' %}
{% block content %}
<main class="main-content" style="overflow-y: auto;">
    <div class="chat-header">
        <div>
            <h1>Nutrition Analysis</h1>
            <p>Enter your details to generate a scientific meal plan.</p>
        </div>
    </div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="card shadow border-0" style="border-radius: 20px;">
                    <div class="card-body p-4 p-md-5">
                        {% if error %}
                        <div class="alert alert-danger" style="border-radius: 12px;">{{ error }}</div>
                        {% endif %}
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Age (years)</label>
                                    <input type="number" name="age" class="form-control form-control-lg" value="25" required min="1" max="120" style="border-radius: 12px; font-size: 0.95rem;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Height (cm)</label>
                                    <input type="number" step="0.1" name="height" class="form-control form-control-lg" value="175" required min="50" max="250" style="border-radius: 12px; font-size: 0.95rem;">
                                </div>
                            </div>
                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Current Weight (kg)</label>
                                    <input type="number" step="0.1" name="current_weight" class="form-control form-control-lg" value="70" required min="20" max="500" style="border-radius: 12px; font-size: 0.95rem;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Target Weight (kg)</label>
                                    <input type="number" step="0.1" name="target_weight" class="form-control form-control-lg" value="68" required min="20" max="500" style="border-radius: 12px; font-size: 0.95rem;">
                                </div>
                            </div>
                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Gender</label>
                                    <select name="gender" class="form-select form-select-lg" style="border-radius: 12px; font-size: 0.95rem;">
                                        <option value="M">Male</option>
                                        <option value="F">Female</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Activity Level</label>
                                    <select name="activity_level" class="form-select form-select-lg" style="border-radius: 12px; font-size: 0.95rem;">
                                        <option value="sedentary">Sedentary (No exercise)</option>
                                        <option value="light">Light (1-3 days/week)</option>
                                        <option value="moderate" selected>Moderate (3-5 days/week)</option>
                                        <option value="active">Active (6-7 days/week)</option>
                                        <option value="very_active">Very Active (Intense)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row g-4 mb-5">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Food Preference</label>
                                    <select name="food_pref" class="form-select form-select-lg" style="border-radius: 12px; font-size: 0.95rem;">
                                        <option value="both" selected>Both</option>
                                        <option value="veg">Vegetarian</option>
                                        <option value="non-veg">Non-Vegetarian</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Cuisine (Optional)</label>
                                    <select name="cuisine" class="form-select form-select-lg" style="border-radius: 12px; font-size: 0.95rem;">
                                        <option value="all" selected>All Cuisines</option>
                                        <option value="indian">Indian</option>
                                        <option value="italian">Italian</option>
                                        <option value="chinese">Chinese</option>
                                        <option value="mexican">Mexican</option>
                                        <option value="american">American</option>
                                        <option value="japanese">Japanese</option>
                                        <option value="french">French</option>
                                        <option value="mediterranean">Mediterranean</option>
                                        <option value="thai">Thai</option>
                                    </select>
                                </div>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg px-5 py-3 shadow-sm" style="background: var(--primary); border: none; border-radius: 15px; font-weight: 700; min-width: 250px;">Generate Weekly Plan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
